name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json "packageManager"; specifying it here
      # too makes pnpm/action-setup@v4 error on the duplicate.
      - uses: pnpm/action-setup@v4

      # No pnpm-lock.yaml is committed (see the install step), so pnpm caching
      # can't key off a lockfile — leave it off.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # No lockfile is committed, so don't require a frozen one.
      - run: pnpm install --no-frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test
